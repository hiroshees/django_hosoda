<div class="closet-title-box d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3 mb-4" >
    <div>
        <h2 class="closet-title-text">✨今日のコーディネート✨</h2>
        <small class="text-muted">季節:<strong>{{ selected_season }}</strong></small>
    </div>
    <div class="d-flex align-items-center gap-2 ">
        <a 
            href="{% url 'coordinate:closet' %}"
            class="btn px-4 text-white font-weight-bold rounded-pill"
            style="background-color:#FF9999"
        >
            クローゼット
        </a>
        <div class="dropdown">
            <button
                class="btn px-4 text-white font-weight-bold rounded-pill dropdown-toggle"
                style="background-color:#FF9999"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
            >
                季節を選んで提案
            </button>
            <ul class="dropdown-menu dropdown-menu-end rounded-3">
                <li><a class="dropdown-menu-item dropdown-item py-2" href="{{ request.path }}?season=spring">春のコーデ🌸</a></li>
                <li><a class="dropdown-menu-item dropdown-item py-2" href="{{ request.path }}?season=summer">夏のコーデ🌻</a></li>
                <li><a class="dropdown-menu-item dropdown-item py-2" href="{{ request.path }}?season=autumn">秋のコーデ🍂</a></li>
                <li><a class="dropdown-menu-item dropdown-item py-2" href="{{ request.path }}?season=winter">冬のコーデ☃</a></li>
                <li><a class="dropdown-menu-item dropdown-item py-2" href="{{ request.path }}">全ての季節🌟</a></li>
            </ul>
        </div>
    </div>
</div>
